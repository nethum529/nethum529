<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nethum Weerasinghe</title>
  <desc id="desc">Minimal neon cyberpunk profile header with subtle scanline animation.</desc>

  <defs>
    <linearGradient id="edge" x1="86" y1="42" x2="1114" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16F4FF"/>
      <stop offset="0.48" stop-color="#8B5CFF"/>
      <stop offset="1" stop-color="#FF2FD6"/>
    </linearGradient>

    <filter id="soft-glow" x="-12%" y="-50%" width="124%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scan" width="1200" height="12" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" fill="#16F4FF" opacity="0.13"/>
      <rect y="6" width="1200" height="1" fill="#FF2FD6" opacity="0.08"/>
      <animateTransform attributeName="patternTransform" type="translate" from="0 0" to="0 24" dur="6s" repeatCount="indefinite"/>
    </pattern>
  </defs>

  <rect width="1200" height="260" rx="0" fill="#05060A"/>
  <rect width="1200" height="260" fill="url(#scan)" opacity="0.42"/>
  <path d="M86 55H448L485 34H1114V205H760L724 226H86V55Z" stroke="url(#edge)" stroke-width="2.5" opacity="0.82" filter="url(#soft-glow)">
    <animate attributeName="opacity" values="0.68;0.9;0.74;0.86;0.68" dur="5.4s" repeatCount="indefinite"/>
  </path>

  <path d="M116 88H280M920 172H1084M116 174H210M990 88H1084" stroke="#16F4FF" stroke-width="2" opacity="0.58">
    <animate attributeName="opacity" values="0.25;0.72;0.25" dur="4.2s" repeatCount="indefinite"/>
  </path>

  <text x="600" y="132" text-anchor="middle" fill="#EEF7FF" font-family="'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="46" font-weight="700" letter-spacing="6">
    NETHUM WEERASINGHE
  </text>
  <text x="600" y="170" text-anchor="middle" fill="#16F4FF" font-family="'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="16" letter-spacing="4" opacity="0.86">
    AI SYSTEMS // GPU OPEN SOURCE // AGENT TOOLING
    <animate attributeName="opacity" values="0.62;0.95;0.72;0.88;0.62" dur="6.5s" repeatCount="indefinite"/>
  </text>

  <rect x="166" y="205" width="868" height="2" fill="#FF2FD6" opacity="0.5">
    <animate attributeName="x" values="166;210;166" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="width" values="868;780;868" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
